<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stories Bot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0C0C0F;color:#E8E8EC;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:#111115;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.3s;z-index:99}
.logo{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.logo-title{font-size:15px;font-weight:600;color:#fff}
.logo-sub{font-size:11px;color:#555;margin-top:1px}
.nav{padding:10px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;color:#888;cursor:pointer;transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#ddd}
.nav-item.active{background:rgba(99,102,241,0.15);color:#a5b4fc}
.account-card{margin:8px;padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
.account-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white;margin-bottom:8px}
.account-name{font-size:12px;font-weight:500;color:#ddd}
.account-handle{font-size:11px;color:#555}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:4px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:#111115;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;gap:8px}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.hamburger{display:none;width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.05);border:none;color:#888;cursor:pointer;font-size:16px;align-items:center;justify-content:center;flex-shrink:0}
.view-tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:8px;padding:3px;gap:2px;flex-shrink:0}
.view-tab{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;color:#666;transition:all 0.15s}
.view-tab.active{background:#1e1e2e;color:#a5b4fc}
.month-nav{display:flex;align-items:center;gap:4px;flex:1;min-width:0;justify-content:center}
.month-btn{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,0.05);border:none;color:#888;cursor:pointer;font-size:14px;flex-shrink:0}
.month-label{font-size:12px;font-weight:500;color:#ddd;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-add{padding:7px 12px;background:#6366f1;border:none;border-radius:8px;color:white;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.stats-bar{display:flex;gap:6px;padding:8px 14px;background:#111115;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;align-items:center;overflow-x:auto}
.stat-item{display:flex;align-items:center;gap:5px;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:7px;white-space:nowrap;flex-shrink:0}
.stat-dot{width:6px;height:6px;border-radius:50%}
.stat-label{font-size:10px;color:#555}
.stat-value{font-size:12px;font-weight:600;color:#ddd}
.btn-publish-now{margin-left:auto;padding:5px 10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);border-radius:7px;color:#a5b4fc;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.calendar-container{flex:1;overflow-y:auto;padding:10px 12px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-header{text-align:center;font-size:9px;font-weight:500;color:#444;text-transform:uppercase;padding:5px 0}
.day-cell{min-height:80px;background:#111115;border-radius:8px;border:1px solid rgba(255,255,255,0.05);padding:5px;cursor:pointer;transition:all 0.15s;position:relative}
.day-cell:hover{border-color:rgba(99,102,241,0.3);background:#13131a}
.day-cell.today{border-color:rgba(99,102,241,0.5)}
.day-cell.other-month{opacity:0.25;pointer-events:none}
.day-cell.has-stories{border-color:rgba(99,102,241,0.2)}
.day-number{font-size:10px;font-weight:500;color:#555;margin-bottom:3px}
.day-cell.today .day-number{color:#a5b4fc;font-weight:600}
.story-pill{display:flex;align-items:center;gap:3px;padding:2px 5px;border-radius:3px;margin-bottom:2px;font-size:8px;font-weight:500;cursor:pointer;white-space:nowrap;overflow:hidden}
.story-pill.scheduled{background:rgba(99,102,241,0.15);color:#a5b4fc}
.story-pill.published{background:rgba(34,197,94,0.12);color:#86efac}
.story-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.story-pill.scheduled .story-dot{background:#6366f1}
.story-pill.published .story-dot{background:#22c55e}
.day-actions{position:absolute;top:3px;right:3px;display:none;gap:2px}
.day-cell:hover .day-actions{display:flex}
.day-action-btn{width:18px;height:18px;border-radius:3px;background:rgba(255,255,255,0.08);border:none;color:#888;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.day-action-btn:hover{background:rgba(99,102,241,0.2);color:#a5b4fc}
.add-story-btn{width:18px;height:18px;border-radius:3px;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.08);color:#333;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px}
.day-cell:hover .add-story-btn{border-color:rgba(99,102,241,0.4);color:#6366f1}
.more-badge{font-size:8px;color:#444;padding:1px 2px}
.week-header-row{display:grid;grid-template-columns:44px repeat(7,1fr);border-bottom:1px solid rgba(255,255,255,0.05)}
.week-day-header{padding:8px 4px;text-align:center;border-left:1px solid rgba(255,255,255,0.05)}
.week-day-name{font-size:9px;color:#555;text-transform:uppercase}
.week-day-num{font-size:18px;font-weight:300;color:#888}
.week-day-header.today-col .week-day-num{color:#a5b4fc}
.week-body{flex:1;overflow-y:auto}
.week-grid{display:grid;grid-template-columns:44px repeat(7,1fr)}
.week-time-slot{height:52px;display:flex;align-items:flex-start;padding-top:3px;font-size:8px;color:#444;font-family:monospace;justify-content:flex-end;padding-right:6px}
.week-day-col{border-left:1px solid rgba(255,255,255,0.05);position:relative}
.week-hour-line{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,0.04)}
.week-event{position:absolute;left:2px;right:2px;background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.4);border-radius:4px;padding:3px 4px;font-size:9px;color:#a5b4fc;cursor:pointer;overflow:hidden;z-index:1}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:98}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:95vh;overflow-y:auto;padding:16px;animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin:0 auto 12px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:600;color:#fff}
.modal-close{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,0.06);border:none;color:#888;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:10px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.form-input{width:100%;padding:9px 11px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#ddd;font-size:13px;font-family:inherit;outline:none}
.form-input:focus{border-color:rgba(99,102,241,0.5)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.media-tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:8px;padding:3px;gap:2px;margin-bottom:8px}
.media-tab{flex:1;padding:6px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:#666;text-align:center;border:none;background:none;font-family:inherit;transition:all 0.15s}
.media-tab.active{background:#1e1e2e;color:#a5b4fc}
.story-preview-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.story-phone{width:80px;flex-shrink:0}
.story-phone-label{font-size:9px;color:#555;text-align:center;margin-bottom:4px}
.story-frame{width:80px;height:142px;background:#1a1a2e;border-radius:10px;border:2px solid rgba(255,255,255,0.1);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.story-frame img,.story-frame video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.story-frame-bar{position:absolute;top:5px;left:5px;right:5px;height:2px;background:rgba(255,255,255,0.25);border-radius:1px;z-index:2}
.story-frame-bar-fill{height:100%;background:white;border-radius:1px;width:55%}
.story-frame-caption{position:absolute;bottom:0;left:0;right:0;padding:6px;background:linear-gradient(transparent,rgba(0,0,0,0.6));z-index:2}
.story-frame-caption-text{font-size:7px;color:white;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.story-frame-empty{font-size:9px;color:#333;text-align:center;padding:8px}
.story-media-section{flex:1}
.upload-area{width:100%;height:88px;background:rgba(255,255,255,0.03);border:2px dashed rgba(255,255,255,0.1);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.upload-area:hover{border-color:rgba(99,102,241,0.4)}
.upload-area.has-file{border-color:rgba(99,102,241,0.4);border-style:solid}
.upload-icon{font-size:20px;margin-bottom:3px}
.upload-text{font-size:11px;color:#555}
.upload-subtext{font-size:9px;color:#444;margin-top:1px}
.upload-input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-preview{position:absolute;inset:0;object-fit:cover;border-radius:6px}
.upload-badge{position:absolute;bottom:5px;right:5px;background:rgba(99,102,241,0.85);color:white;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:500}
.modal-actions{display:flex;gap:6px;margin-top:14px;padding-bottom:env(safe-area-inset-bottom,8px)}
.btn-cancel{flex:1;padding:11px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#888;font-size:13px;cursor:pointer;font-family:inherit}
.btn-save{flex:2;padding:11px;background:#6366f1;border:none;border-radius:10px;color:white;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}
.btn-delete{padding:11px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:10px;color:#f87171;font-size:13px;cursor:pointer;font-family:inherit}
.repeat-preview{font-size:10px;color:#6366f1;margin-top:3px;padding:3px 7px;background:rgba(99,102,241,0.08);border-radius:4px;display:none}
.progress-bar{width:100%;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:6px;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a855f7);border-radius:2px;transition:width 0.3s}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e2e;border:1px solid rgba(99,102,241,0.3);border-radius:10px;padding:10px 16px;font-size:12px;color:#a5b4fc;z-index:200;opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:85vw;text-align:center;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.error{border-color:rgba(239,68,68,0.3);color:#f87171}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .hamburger{display:flex}
  .view-tabs .view-tab{padding:4px 7px;font-size:10px}
  .calendar-container{padding:6px}
  .calendar-grid{gap:2px}
  .day-cell{min-height:56px;padding:3px}
  .day-header{font-size:8px;padding:3px 0}
  .btn-add-text{display:none}
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="logo"><div class="logo-title">Stories Bot</div><div class="logo-sub">Agendador Automatico</div></div>
    <div class="nav">
      <div class="nav-item active" id="nav-month" onclick="switchNav('month')">&#9647; Mensal</div>
      <div class="nav-item" id="nav-week" onclick="switchNav('week')">&#9776; Semanal</div>
    </div>
    <div class="account-card">
      <div class="account-avatar">K</div>
      <div class="account-name"><span class="status-dot"></span>ktsmartsam</div>
      <div class="account-handle">@ktsmartsam</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <div class="view-tabs">
          <div class="view-tab active" id="tab-month" onclick="switchTab('month')">Mes</div>
          <div class="view-tab" id="tab-week" onclick="switchTab('week')">Semana</div>
        </div>
        <div class="month-nav">
          <button class="month-btn" onclick="prevPeriod()">&#8249;</button>
          <div class="month-label" id="period-label">Marco 2026</div>
          <button class="month-btn" onclick="nextPeriod()">&#8250;</button>
        </div>
      </div>
      <button class="btn-add" onclick="openModal()">+ <span class="btn-add-text">Novo</span></button>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-dot" style="background:#6366f1"></div><span class="stat-label">Agendados </span><span class="stat-value" id="stat-scheduled">0</span></div>
      <div class="stat-item"><div class="stat-dot" style="background:#22c55e"></div><span class="stat-label">Publicados </span><span class="stat-value" id="stat-published">0</span></div>
      <div class="stat-item"><div class="stat-dot" style="background:#a855f7"></div><span class="stat-label">Mes </span><span class="stat-value" id="stat-month">0</span></div>
      <button class="btn-publish-now" onclick="openPublishNow()">&#9654; Publicar</button>
    </div>
    <div class="calendar-container" id="calendar-container"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Novo Story</div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="story-preview-row">
      <div class="story-phone">
        <div class="story-phone-label">Preview</div>
        <div class="story-frame" id="story-frame">
          <div class="story-frame-bar"><div class="story-frame-bar-fill"></div></div>
          <div class="story-frame-empty" id="story-frame-empty">Sem midia</div>
          <img id="story-frame-img" style="display:none">
          <video id="story-frame-video" style="display:none" muted loop autoplay playsinline></video>
          <div class="story-frame-caption"><div class="story-frame-caption-text" id="story-frame-caption"></div></div>
        </div>
      </div>
      <div class="story-media-section">
        <div class="form-group">
          <label class="form-label">Midia</label>
          <div class="media-tabs">
            <button class="media-tab active" id="tab-url" onclick="switchMediaTab('url')">URL</button>
            <button class="media-tab" id="tab-upload" onclick="switchMediaTab('upload')">Upload</button>
          </div>
          <div id="section-url">
            <input type="url" class="form-input" id="input-url" placeholder="https://...jpg ou .mp4" oninput="updatePreview()">
          </div>
          <div id="section-upload" style="display:none">
            <div class="upload-area" id="upload-area">
              <input type="file" id="file-input" class="upload-input" accept="image/jpeg,image/png,video/mp4,video/quicktime" onchange="handleFileSelect(event)">
              <div id="upload-content"><div class="upload-icon">&#128248;</div><div class="upload-text">Selecionar</div><div class="upload-subtext">JPG PNG MP4</div></div>
              <img id="upload-preview-img" class="upload-preview" style="display:none">
              <video id="upload-preview-video" class="upload-preview" style="display:none" muted></video>
              <div class="upload-badge" id="upload-badge" style="display:none"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Data</label><input type="date" class="form-input" id="input-date"></div>
      <div class="form-group"><label class="form-label">Horario</label><input type="time" class="form-input" id="input-time" value="09:00"></div>
    </div>
    <div class="form-group"><label class="form-label">Legenda</label><input type="text" class="form-input" id="input-caption" placeholder="Legenda..." oninput="document.getElementById('story-frame-caption').textContent=this.value"></div>
    <div class="form-group">
      <label class="form-label">Repetir</label>
      <select class="form-input" id="input-repeat" onchange="updateRepeatPreview()">
        <option value="none">Sem repeticao</option>
        <option value="daily">Diariamente (7 dias)</option>
        <option value="weekly">Semanalmente (4 semanas)</option>
        <option value="weekdays">Dias uteis (5 dias)</option>
        <option value="monthly">Mensalmente (3 meses)</option>
      </select>
      <div class="repeat-preview" id="repeat-preview"></div>
    </div>
    <div class="modal-actions" id="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveStory()">Agendar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-publish" style="display:none" onclick="if(event.target.id==='modal-publish')document.getElementById('modal-publish').style.display='none'">
  <div class="modal" style="max-width:480px">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Publicar Agora</div>
      <button class="modal-close" onclick="document.getElementById('modal-publish').style.display='none'">&#215;</button>
    </div>
    <div class="story-preview-row">
      <div class="story-phone">
        <div class="story-phone-label">Preview</div>
        <div class="story-frame">
          <div class="story-frame-bar"><div class="story-frame-bar-fill"></div></div>
          <div id="pnow-frame-empty" style="font-size:9px;color:#333;text-align:center;padding:8px">Sem midia</div>
          <img id="pnow-frame-img" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0">
          <video id="pnow-frame-video" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0" muted loop autoplay playsinline></video>
        </div>
      </div>
      <div class="story-media-section">
        <div class="form-group">
          <label class="form-label">Midia</label>
          <div class="media-tabs">
            <button class="media-tab active" id="pnow-tab-url" onclick="switchPublishTab('url')">URL</button>
            <button class="media-tab" id="pnow-tab-upload" onclick="switchPublishTab('upload')">Upload</button>
          </div>
          <div id="pnow-section-url">
            <input type="url" class="form-input" id="pnow-url" placeholder="https://...jpg ou .mp4" oninput="updatePublishPreview()">
          </div>
          <div id="pnow-section-upload" style="display:none">
            <div class="upload-area" id="pnow-upload-area">
              <input type="file" id="pnow-file-input" class="upload-input" accept="image/jpeg,image/png,video/mp4,video/quicktime" onchange="handlePublishFileSelect(event)">
              <div id="pnow-upload-content"><div class="upload-icon">&#128248;</div><div class="upload-text">Selecionar</div><div class="upload-subtext">JPG PNG MP4</div></div>
              <img id="pnow-preview-img" class="upload-preview" style="display:none">
              <video id="pnow-preview-video" class="upload-preview" style="display:none" muted></video>
              <div class="upload-badge" id="pnow-badge" style="display:none"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="progress-bar" id="publish-progress"><div class="progress-fill" id="publish-progress-fill" style="width:0%"></div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('modal-publish').style.display='none'">Cancelar</button>
      <button class="btn-save" id="btn-publish-now" onclick="publishNow()">Publicar Agora</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL='https://stories-bot-s4r5.onrender.com';
const IG_ID='34374106182233912';
const MONTHS=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
let currentDate=new Date(),currentView='month',editingStory=null,selectedFile=null,publishFile=null;
let stories=JSON.parse(localStorage.getItem('sb_v5')||'[]');
if(!stories.length){
  const n=new Date(),y=n.getFullYear(),m=String(n.getMonth()+1).padStart(2,'0'),d=n.getDate();
  stories=[
    {id:1,url:'https://picsum.photos/400/700?random=10',date:y+'-'+m+'-'+String(d).padStart(2,'0'),time:'09:00',caption:'Story de hoje!',status:'published',repeat:'none',mediaType:'IMAGE'},
    {id:2,url:'https://picsum.photos/400/700?random=11',date:y+'-'+m+'-'+String(d+1).padStart(2,'0'),time:'14:00',caption:'Promocao especial',status:'scheduled',repeat:'none',mediaType:'IMAGE'},
    {id:3,url:'https://picsum.photos/400/700?random=12',date:y+'-'+m+'-'+String(d+2).padStart(2,'0'),time:'18:00',caption:'Novidades chegando',status:'scheduled',repeat:'weekly',mediaType:'IMAGE'},
  ];save();
}
function save(){localStorage.setItem('sb_v5',JSON.stringify(stories));updateStats();}
function updateStats(){
  document.getElementById('stat-scheduled').textContent=stories.filter(s=>s.status==='scheduled').length;
  document.getElementById('stat-published').textContent=stories.filter(s=>s.status==='published').length;
  const n=new Date();document.getElementById('stat-month').textContent=stories.filter(s=>{const d=new Date(s.date+'T12:00:00');return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).length;
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('show');}
function switchMediaTab(t){['url','upload'].forEach(x=>{document.getElementById('tab-'+x).classList.toggle('active',x===t);document.getElementById('section-'+x).style.display=x===t?'block':'none';});selectedFile=null;updatePreview();}
function switchPublishTab(t){['url','upload'].forEach(x=>{document.getElementById('pnow-tab-'+x).classList.toggle('active',x===t);document.getElementById('pnow-section-'+x).style.display=x===t?'block':'none';});publishFile=null;}
function setFrameMedia(frameImg,frameVideo,frameEmpty,src,isVideo){
  if(src){frameEmpty.style.display='none';if(isVideo){frameVideo.src=src;frameVideo.style.display='block';frameImg.style.display='none';}else{frameImg.src=src;frameImg.style.display='block';frameVideo.style.display='none';frameImg.onerror=()=>{frameImg.style.display='none';frameEmpty.style.display='block';};}}
  else{frameImg.style.display='none';frameVideo.style.display='none';frameEmpty.style.display='block';}
}
function updatePreview(){
  const url=document.getElementById('input-url').value;
  const isVideo=url.toLowerCase().includes('.mp4')||url.toLowerCase().includes('video');
  setFrameMedia(document.getElementById('story-frame-img'),document.getElementById('story-frame-video'),document.getElementById('story-frame-empty'),url&&url.startsWith('http')?url:null,isVideo);
}
function updatePublishPreview(){
  const url=document.getElementById('pnow-url').value;
  const isVideo=url.toLowerCase().includes('.mp4')||url.toLowerCase().includes('video');
  setFrameMedia(document.getElementById('pnow-frame-img'),document.getElementById('pnow-frame-video'),document.getElementById('pnow-frame-empty'),url&&url.startsWith('http')?url:null,isVideo);
}
async function handleFileSelect(e){
  const f=e.target.files[0];if(!f)return;selectedFile=f;
  // Upload imediato para Cloudinary
  showToast('Fazendo upload...');
  const fd=new FormData();fd.append('file',f);fd.append('ig_id',IG_ID);
  try{
    const r=await fetch(API_URL+'/upload',{method:'POST',body:fd});
    const d=await r.json();
    if(d.url){
      document.getElementById('input-url').value=d.url;
      switchMediaTab('url');
      updatePreview();
      showToast('Upload concluido! URL gerada.');
      selectedFile=null;
      return;
    }
  }catch(e2){showToast('Erro no upload',true);}
  document.getElementById('upload-content').style.display='none';
  const badge=document.getElementById('upload-badge');badge.style.display='block';badge.textContent=f.type.includes('video')?'VIDEO':'IMG';
  document.getElementById('upload-area').classList.add('has-file');
  const url=URL.createObjectURL(f);
  const isVideo=f.type.includes('video');
  if(isVideo){document.getElementById('upload-preview-video').src=url;document.getElementById('upload-preview-video').style.display='block';}
  else{document.getElementById('upload-preview-img').src=url;document.getElementById('upload-preview-img').style.display='block';}
  setFrameMedia(document.getElementById('story-frame-img'),document.getElementById('story-frame-video'),document.getElementById('story-frame-empty'),url,isVideo);
}
function handlePublishFileSelect(e){
  const f=e.target.files[0];if(!f)return;publishFile=f;
  document.getElementById('pnow-upload-content').style.display='none';
  const badge=document.getElementById('pnow-badge');badge.style.display='block';badge.textContent=f.type.includes('video')?'VIDEO':'IMG';
  const url=URL.createObjectURL(f);
  const isVideo=f.type.includes('video');
  if(isVideo){document.getElementById('pnow-preview-video').src=url;document.getElementById('pnow-preview-video').style.display='block';}
  else{document.getElementById('pnow-preview-img').src=url;document.getElementById('pnow-preview-img').style.display='block';}
  setFrameMedia(document.getElementById('pnow-frame-img'),document.getElementById('pnow-frame-video'),document.getElementById('pnow-frame-empty'),url,isVideo);
}
function switchNav(v){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('nav-'+v).classList.add('active');switchTab(v);closeSidebar();}
function switchTab(v){currentView=v;document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+v).classList.add('active');render();}
function prevPeriod(){if(currentView==='month')currentDate.setMonth(currentDate.getMonth()-1);else currentDate.setDate(currentDate.getDate()-7);render();}
function nextPeriod(){if(currentView==='month')currentDate.setMonth(currentDate.getMonth()+1);else currentDate.setDate(currentDate.getDate()+7);render();}
function render(){if(currentView==='month')renderMonth();else renderWeek();}
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function renderMonth(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  document.getElementById('period-label').textContent=MONTHS[m]+' '+y;
  const c=document.getElementById('calendar-container');c.innerHTML='';
  const g=document.createElement('div');g.className='calendar-grid';
  DAYS.forEach(d=>{const h=document.createElement('div');h.className='day-header';h.textContent=d;g.appendChild(h);});
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
  for(let i=0;i<fd;i++)g.appendChild(mkCell(new Date(y,m-1,dip-fd+i+1),true));
  for(let d=1;d<=dim;d++)g.appendChild(mkCell(new Date(y,m,d),false));
  const rem=42-fd-dim;for(let d=1;d<=rem;d++)g.appendChild(mkCell(new Date(y,m+1,d),true));
  c.appendChild(g);
}
function mkCell(date,other){
  const cell=document.createElement('div'),dstr=ds(date),today=ds(new Date()),ss=stories.filter(s=>s.date===dstr);
  cell.className='day-cell'+(other?' other-month':'')+(dstr===today?' today':'')+(ss.length?' has-stories':'');
  const n=document.createElement('div');n.className='day-number';n.textContent=date.getDate();cell.appendChild(n);
  if(!other&&ss.length){const acts=document.createElement('div');acts.className='day-actions';const dup=document.createElement('button');dup.className='day-action-btn';dup.title='Duplicar';dup.textContent='D';dup.onclick=e=>{e.stopPropagation();dupDay(dstr);};acts.appendChild(dup);cell.appendChild(acts);}
  ss.slice(0,3).forEach(s=>{const p=document.createElement('div');p.className='story-pill '+s.status;const dot=document.createElement('div');dot.className='story-dot';p.appendChild(dot);p.appendChild(document.createTextNode(s.time+' '+(s.caption||'Story').substring(0,7)));p.onclick=e=>{e.stopPropagation();openEdit(s);};cell.appendChild(p);});
  if(ss.length>3){const more=document.createElement('div');more.className='more-badge';more.textContent='+'+( ss.length-3);cell.appendChild(more);}
  if(!other){const add=document.createElement('div');add.className='add-story-btn';add.innerHTML='+';add.onclick=e=>{e.stopPropagation();openModal(dstr);};cell.appendChild(add);cell.onclick=()=>openModal(dstr);}
  return cell;
}
function renderWeek(){
  const st=new Date(currentDate);st.setDate(st.getDate()-st.getDay());
  const en=new Date(st);en.setDate(en.getDate()+6);
  const fmt=d=>d.getDate()+' '+MONTHS[d.getMonth()].substring(0,3);
  document.getElementById('period-label').textContent=fmt(st)+'-'+fmt(en);
  const c=document.getElementById('calendar-container');c.innerHTML='';
  const todayStr=ds(new Date());
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;height:100%';
  const hr=document.createElement('div');hr.className='week-header-row';hr.innerHTML='<div></div>';
  for(let d=0;d<7;d++){const date=new Date(st);date.setDate(date.getDate()+d);const col=document.createElement('div');col.className='week-day-header '+(ds(date)===todayStr?'today-col':'');col.innerHTML='<div class="week-day-name">'+DAYS[date.getDay()]+'</div><div class="week-day-num">'+date.getDate()+'</div>';hr.appendChild(col);}
  wrap.appendChild(hr);
  const body=document.createElement('div');body.className='week-body';
  const grid=document.createElement('div');grid.className='week-grid';
  const tc=document.createElement('div');
  for(let h=6;h<=23;h++){const s=document.createElement('div');s.className='week-time-slot';s.textContent=h+'h';tc.appendChild(s);}
  grid.appendChild(tc);
  for(let d=0;d<7;d++){
    const date=new Date(st);date.setDate(date.getDate()+d);
    const dstr=ds(date),ss=stories.filter(s=>s.date===dstr);
    const col=document.createElement('div');col.className='week-day-col';col.style.cssText='position:relative;height:936px';
    for(let h=0;h<=17;h++){const l=document.createElement('div');l.className='week-hour-line';l.style.top=(h*52)+'px';col.appendChild(l);}
    ss.forEach(s=>{const[hh,mm]=s.time.split(':').map(Number),top=(hh-6)*52+Math.round(mm*52/60);if(top>=0&&top<936){const ev=document.createElement('div');ev.className='week-event';ev.style.top=top+'px';ev.style.height='44px';ev.innerHTML='<div style="font-weight:500">'+s.time+'</div><div style="opacity:0.7;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+(s.caption||'Story')+'</div>';ev.onclick=()=>openEdit(s);col.appendChild(ev);}});
    grid.appendChild(col);
  }
  body.appendChild(grid);wrap.appendChild(body);c.appendChild(wrap);
}
function resetUpload(){document.getElementById('upload-content').style.cssText='display:flex;flex-direction:column;align-items:center';document.getElementById('upload-badge').style.display='none';document.getElementById('upload-area').classList.remove('has-file');document.getElementById('upload-preview-img').style.display='none';document.getElementById('upload-preview-video').style.display='none';document.getElementById('file-input').value='';}
function openModal(date){
  editingStory=null;selectedFile=null;
  document.getElementById('modal-title').textContent='Novo Story';
  document.getElementById('input-url').value='';
  document.getElementById('input-date').value=date||ds(new Date());
  document.getElementById('input-time').value='09:00';
  document.getElementById('input-caption').value='';
  document.getElementById('input-repeat').value='none';
  document.getElementById('story-frame-caption').textContent='';
  document.getElementById('repeat-preview').style.display='none';
  document.getElementById('story-frame-img').style.display='none';
  document.getElementById('story-frame-video').style.display='none';
  document.getElementById('story-frame-empty').style.display='block';
  switchMediaTab('url');resetUpload();
  document.getElementById('modal-actions').innerHTML='<button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="saveStory()">Agendar</button>';
  document.getElementById('modal').style.display='flex';
}
function openEdit(s){
  editingStory=s;selectedFile=null;
  document.getElementById('modal-title').textContent='Editar Story';
  document.getElementById('input-url').value=s.url||'';
  document.getElementById('input-date').value=s.date;
  document.getElementById('input-time').value=s.time;
  document.getElementById('input-caption').value=s.caption||'';
  document.getElementById('input-repeat').value=s.repeat||'none';
  document.getElementById('story-frame-caption').textContent=s.caption||'';
  document.getElementById('repeat-preview').style.display='none';
  switchMediaTab('url');resetUpload();updatePreview();
  document.getElementById('modal-actions').innerHTML='<button class="btn-delete" onclick="delStory()">Excluir</button><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="saveStory()">Salvar</button>';
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';editingStory=null;selectedFile=null;}
function updateRepeatPreview(){const r=document.getElementById('input-repeat').value,p=document.getElementById('repeat-preview');const msgs={daily:'7 dias seguidos',weekly:'4 semanas',weekdays:'5 dias uteis',monthly:'3 meses'};p.textContent=msgs[r]||'';p.style.display=r!=='none'?'block':'none';}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return ds(x);}
async function saveStory(){
  const date=document.getElementById('input-date').value,time=document.getElementById('input-time').value,caption=document.getElementById('input-caption').value,repeat=document.getElementById('input-repeat').value,url=document.getElementById('input-url').value;
  if(!date||!time){showToast('Preencha data e horario!',true);return;}
  let mt=selectedFile?(selectedFile.type.includes('video')?'VIDEO':'IMAGE'):(url.toLowerCase().includes('.mp4')?'VIDEO':'IMAGE');
  let fu=url;
  if(selectedFile){
    showToast('Fazendo upload...');
    const fd=new FormData();fd.append('file',selectedFile);fd.append('ig_id',IG_ID);
    try{
      const r=await fetch(API_URL+'/upload',{method:'POST',body:fd});
      const d=await r.json();
      if(d.url){fu=d.url;mt=d.mediaType||mt;showToast('Upload concluido!');}
      else{showToast('Erro no upload',true);return;}
    }catch(e){showToast('Erro no upload',true);return;}
  }
  if(editingStory){const i=stories.findIndex(s=>s.id===editingStory.id);if(i>=0)stories[i]={...stories[i],url:fu,date,time,caption,repeat,mediaType:mt};showToast('Story atualizado');}
  else{
    const base={id:Date.now(),url:fu,date,time,caption,repeat,status:'scheduled',mediaType:mt};stories.push(base);
    if(repeat==='daily')for(let i=1;i<=6;i++)stories.push({...base,id:Date.now()+i,date:addDays(date,i)});
    else if(repeat==='weekly')for(let i=1;i<=3;i++)stories.push({...base,id:Date.now()+i*100,date:addDays(date,7*i)});
    else if(repeat==='weekdays'){let c=0,i=1;while(c<4){const d=new Date(date+'T12:00:00');d.setDate(d.getDate()+i);if(d.getDay()!==0&&d.getDay()!==6){stories.push({...base,id:Date.now()+i*10,date:ds(d)});c++;}i++;}}
    else if(repeat==='monthly')for(let i=1;i<=3;i++){const d=new Date(date+'T12:00:00');d.setMonth(d.getMonth()+i);stories.push({...base,id:Date.now()+i*1000,date:ds(d)});}
    fetch(API_URL+'/schedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({},base,{ig_id:IG_ID}))}).catch(()=>{});
    showToast('Story agendado!');
  }
  save();closeModal();render();
}
function delStory(){if(!editingStory||!confirm('Excluir?'))return;stories=stories.filter(s=>s.id!==editingStory.id);save();closeModal();render();showToast('Excluido');}
function dupDay(dstr){
  const ss=stories.filter(s=>s.date===dstr);if(!ss.length)return;
  const next=new Date(dstr+'T12:00:00');next.setDate(next.getDate()+7);
  ss.forEach(s=>stories.push({...s,id:Date.now()+Math.random()*999,date:ds(next),status:'scheduled'}));
  save();render();showToast(ss.length+' story(s) duplicado(s) para proxima semana!');
}
function openPublishNow(){
  publishFile=null;document.getElementById('pnow-url').value='';
  document.getElementById('pnow-frame-img').style.display='none';document.getElementById('pnow-frame-video').style.display='none';document.getElementById('pnow-frame-empty').style.display='block';
  document.getElementById('pnow-upload-content').style.cssText='display:flex;flex-direction:column;align-items:center';
  document.getElementById('pnow-badge').style.display='none';document.getElementById('pnow-file-input').value='';
  switchPublishTab('url');document.getElementById('modal-publish').style.display='flex';
}
async function publishNow(){
  const btn=document.getElementById('btn-publish-now'),prog=document.getElementById('publish-progress'),fill=document.getElementById('publish-progress-fill');
  btn.disabled=true;btn.textContent='Publicando...';prog.style.display='block';fill.style.width='20%';
  try{
    let r;
    if(publishFile){const fd=new FormData();fd.append('file',publishFile);fd.append('ig_id',IG_ID);fill.style.width='40%';r=await fetch(API_URL+'/stories/publish',{method:'POST',body:fd});}
    else{const url=document.getElementById('pnow-url').value;if(!url){showToast('Selecione uma midia!',true);btn.disabled=false;btn.textContent='Publicar Agora';prog.style.display='none';return;}fill.style.width='40%';r=await fetch(API_URL+'/stories/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ig_id:IG_ID,media_url:url,media_type:url.toLowerCase().includes('.mp4')?'VIDEO':'IMAGE'})});}
    fill.style.width='80%';const data=await r.json();
    if(data.success){fill.style.width='100%';stories.push({id:Date.now(),url:publishFile?'[arquivo]':document.getElementById('pnow-url').value,date:ds(new Date()),time:new Date().toTimeString().substring(0,5),caption:'Publicado agora',status:'published',repeat:'none',mediaType:publishFile?(publishFile.type.includes('video')?'VIDEO':'IMAGE'):'IMAGE'});save();render();document.getElementById('modal-publish').style.display='none';showToast('Story publicado!');}
    else showToast('Erro: '+(data.error||'Falha'),true);
  }catch(e){showToast('Erro de conexao',true);}
  btn.disabled=false;btn.textContent='Publicar Agora';setTimeout(()=>{prog.style.display='none';fill.style.width='0%';},2000);
}
function showToast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' error':'');t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3500);}
setInterval(()=>{
  const n=new Date(),dstr=ds(n),tstr=n.toTimeString().substring(0,5);
  stories.forEach(s=>{if(s.status==='scheduled'&&s.date===dstr&&s.time===tstr&&s.url&&!s.url.startsWith('[arquivo')){fetch(API_URL+'/stories/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ig_id:IG_ID,media_url:s.url,media_type:s.mediaType||'IMAGE'})}).then(r=>r.json()).then(d=>{if(d.success){s.status='published';save();render();showToast('Story de '+s.time+' publicado!');}}).catch(()=>{});}});
},60000);
render();updateStats();
</script>
</body>
</html>
